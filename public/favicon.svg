<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Agulha -->
  <line x1="36" y1="12" x2="42" y2="6" stroke="#1a6fb4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38.5" y1="9.5" x2="44" y2="4" stroke="#1a6fb4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Corpo da seringa -->
  <rect x="10" y="18" width="26" height="12" rx="2" fill="#e8f1fb" stroke="#1a6fb4" stroke-width="2"/>
  <!-- Êmbolo (líquido) -->
  <rect x="12" y="20" width="14" height="8" rx="1" fill="#1a6fb4" opacity="0.7"/>
  <!-- Haste do êmbolo -->
  <rect x="36" y="21" width="8" height="6" rx="1" fill="none" stroke="#1a6fb4" stroke-width="2"/>
  <line x1="44" y1="22" x2="46" y2="22" stroke="#1a6fb4" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="26" x2="46" y2="26" stroke="#1a6fb4" stroke-width="2" stroke-linecap="round"/>
  <!-- Ponta da agulha conectando ao corpo -->
  <path d="M10 21 L6 24 L10 27" fill="none" stroke="#1a6fb4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="4" y1="24" x2="6" y2="24" stroke="#1a6fb4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Marcações na seringa -->
  <line x1="20" y1="18" x2="20" y2="16" stroke="#1a6fb4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="18" x2="26" y2="16" stroke="#1a6fb4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="18" x2="32" y2="16" stroke="#1a6fb4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
